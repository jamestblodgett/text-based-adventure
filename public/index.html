<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Java + HTML Demo</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<h1>Text-based Adventure game</h1>

<button onclick="callJava()">Call Java Server</button>
<div id="output"></div>

<script>
function callJava() {
  fetch("/hello")
    .then(r => r.json())
    .then(data => {
      document.getElementById("output").innerText = data.message;
    });
}
</script>

</body>
</html>
